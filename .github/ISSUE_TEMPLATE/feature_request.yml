name: Feature request
description: Suggest an idea or improvement for sornaris
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like sornaris to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New bisect axis (tool-schema, RAG corpus, ...)
        - New provider adapter
        - CLI / output format
        - Scoring / evaluation
        - Caching
        - Docs / examples
        - Other
    validations:
      required: true
