name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build dist + SBOM + Sigstore signatures
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build cyclonedx-bom pip-audit

      - name: Set SOURCE_DATE_EPOCH for reproducible build
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Build sdist + wheel
        run: python -m build

      - name: Read tag version
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify pyproject version matches tag
        run: |
          PYPROJECT_VERSION="$(python -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: pyproject=$PYPROJECT_VERSION tag=$TAG_VERSION" >&2
            exit 1
          fi
          echo "Version match: $PYPROJECT_VERSION"

      - name: Install the wheel into the runner env (for SBOM and audit)
        run: pip install "dist/sornaris-${GITHUB_REF_NAME#v}-py3-none-any.whl"

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py environment --of JSON -o dist/sbom.cdx.json
          cyclonedx-py environment --of XML  -o dist/sbom.cdx.xml
          ls -la dist/

      - name: Audit installed dependencies for known CVEs
        run: |
          pip list --format freeze | grep -v "^sornaris==" > /tmp/runtime-deps.txt
          echo "--- runtime deps ---"
          cat /tmp/runtime-deps.txt
          pip-audit --strict --format columns --requirement /tmp/runtime-deps.txt

      - name: Sign wheel and sdist with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: |
            ./dist/*.whl
            ./dist/*.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI (Trusted Publisher + PEP 740 attestations)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sornaris/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Drop non-distribution files from dist/
        run: |
          find dist/ -mindepth 1 -maxdepth 1 ! -name '*.whl' ! -name '*.tar.gz' -delete
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
          skip-existing: true
          print-hash: true

  github-release:
    name: Create GitHub Release with SBOM
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate SHA256SUMS
        run: |
          cd dist
          ls -la
          sha256sum sornaris-*.whl sornaris-*.tar.gz sbom.cdx.json sbom.cdx.xml \
              *.sigstore.json 2>/dev/null \
              | tee SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/sornaris-*.whl
            dist/sornaris-*.tar.gz
            dist/*.sigstore.json
            dist/sbom.cdx.json
            dist/sbom.cdx.xml
            dist/SHA256SUMS
